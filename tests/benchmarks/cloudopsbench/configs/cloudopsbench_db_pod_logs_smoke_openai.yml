# Cloud-OpsBench — DB-evidence pipeline smoke (40 cases, three-arm).
#
# Experiment ID: ``exp_db_evidence_pipeline`` (smoke phase)
#
# Tests TWO complementary mechanisms together (intentional — they form an
# evidence-collection → evidence-translation pipeline):
#
#   LAYER 1 — Planner rule (bench_agent.py:_TRIMMED_BENCH_SYSTEM_PROMPT,
#   added 2026-06-11): "when the failing service shows connection-related
#   errors, also call GetErrorLogs on the dependency pod (database / cache
#   / queue) before concluding." Expands what evidence the investigation
#   gathers; does NOT bias localization.
#
#   LAYER 2 — B1 investigation handoff
#   (predictor/investigation_handoff.py, added 2026-06-11): deterministic
#   post-pass on top_3_predictions that promotes rank-2 to rank-1 when
#   the investigation prose supports it better (token-overlap scoring with
#   min threshold). Catches the runtime/56 translation-loss class where
#   the predictor LLM re-diagnoses from the alert and buries the
#   investigation-supported answer at rank-2.
#
# Why test them together: they're complementary by design.
#   Planner rule ensures DB-pod log evidence enters investigation_summary
#   → B1 handoff ensures that evidence translates to rank-1 in scored
#   output. Without either: planner-rule-only leaves the right RC at
#   rank-2 if the predictor re-diagnoses; B1-only can't promote what was
#   never gathered. Together: stronger pipeline than either alone.
#
# Trade-off acknowledged: smoke measures their JOINT effect; cannot
# isolate individual contributions in one run. If positive at full-N,
# follow-up ablation can attribute the lift between layers. The
# coordinated-pair design is the load-bearing experimental unit.
#
# Motivation (full triage in
# ~/DevBox/tracer-cloud/opensre-notes/cloudopsbench-experiments-chain.md §10-11):
#   - 50.6% of Runtime opensre+llm losses (118 of 233) are DB-localization
#     failures on the default-predictor + trimmed-prompt + vocab-fixed
#     baseline.
#   - opensre's investigation NEVER queries the DB pod's logs — only the
#     upstream caller. The pattern is invariant across 17 sampled failing
#     tsdb-mysql cases (same tool sequence every time:
#     GetAlerts → GetResources → GetErrorLogs → GetErrorLogs).
#   - The bench corpus DOES carry MySQL container logs (indexed as
#     `tsdb-mysql`, `nacosdb-mysql`, etc. in raw_data/logs.json). The
#     existing GetErrorLogs tool can already read them — the agent just
#     never asks.
#
# Mechanism (mechanism-only rule per
# memory/feedback_mechanism_only_in_bench_prompts.md):
#   The planner change is an INVESTIGATION-layer rule: expand what evidence
#   is gathered, do not bias localization. The final fault_object is
#   whichever the evidence points at — including "DB is healthy but caller
#   config is wrong", in which case the caller IS the fault. This is the
#   structural dual of the rejected DB-localization rule (2026-06-09): that
#   rule biased the predictor's labeling, this one expands the
#   investigation's collection.
#
# Risk + mitigation:
#   - Over-firing (querying DB logs when not needed): tool-call cost only,
#     no localization cost. Acceptable.
#   - Same trigger-looseness pitfall as the DB-localization rule: this
#     smoke is the test. If aggregate A@1 drops or DB-pod log query rate is
#     unreasonably high (>50% of all cases), reject and revisit.
#
# Run — ON AWS FARGATE ONLY (no local runs; transparency policy):
#   1. git push the branch (image SHA → provenance.json)
#   2. gh workflow run "Benchmark image — build + push to ECR" --ref <branch>
#   3. gh workflow run "Benchmark image — promote" --ref <branch> -f image_tag=<sha>
#   4. gh workflow run "Benchmark — run on Fargate" --ref <branch> \
#        -f config="tests/benchmarks/cloudopsbench/configs/cloudopsbench_db_pod_logs_smoke_openai.yml"
#
# Why Fargate-only: local `uv run` invocations stamp opensre_sha=(no-git)
# in provenance.json and lose the ECR-pinned image digest. Local runs are
# unverifiable; Fargate runs are publicly reproducible from S3 + the ECR
# image digest. Local is a debugging tool, NOT an experiment record.
#
# Cost: ~$8-10 (mirrors the trimmed-prompt n=40 smoke at ~$8.30; the new
# rule may add 1-2 tool calls per case on DB-shape scenarios, slight cost
# bump).
# Wall time: ~30-45 min Fargate at workers=1.
#
# Smoke gate (advance to full-N):
#   ALL of:
#   (a) opensre+llm aggregate A@1 ≥ baseline + 0.02 (point estimate; smoke
#       CI need not exclude 0). Joint mechanism lift.
#   (b1) Planner rule fired: opensre's evidence_entries on DB-backed cases
#        SHOULD contain at least one GetErrorLogs::tsdb-mysql / nacosdb-
#        mysql / redis-cart on ≥30% of opensre+llm cells where GT
#        fault_object is a DB service. Verifies LAYER 1.
#   (b2) B1 handoff fired: at least one rank-2→rank-1 promotion log line
#        (``[investigation_handoff] promoting rank N → 1``) appears on
#        opensre+llm cases. ≥10% rate is a reasonable advance threshold.
#        Verifies LAYER 2.
#
# If (b1) is 0%: the planner prompt edit didn't take effect.
# If (b2) is 0%: B1 handoff never fired — either rank-1 was always
#   correct, or token-overlap scoring isn't matching the investigation
#   prose patterns. Both are diagnostic, not failure.
# If (a) FAIL but (b1) + (b2) PASS: mechanisms fire but don't lift.
#   Pipeline not improving the scored outcome → pivot to next backlog item.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3
workers: 1
cost_budget_usd: 25.0
seed: 42

output_dir: .bench-results/cloudopsbench_db_pod_logs_smoke_openai/

# Re-using the existing exp_structured_outputs pre-reg is wrong (different
# hypothesis). Pre-reg is committed when this smoke passes the gate and the
# full-N is planned — until then, this smoke is exploratory per BDIL
# Phase 0 ("pilot is exploratory" — full-N requires a pre-reg).
pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # 40 seeded cases — same seed=42 slice as the prior smokes. Deterministic
  # superset / subset depending on order.
  limit: 40
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# Floor=0 + trimmed prompt — matches the current bench default. The
# trimmed-prompt agent's system prompt is what carries the new planner
# rule.
min_tool_calls: 0
agent_variant: trimmed_prompt

# Default predictor (NOT structured outputs — that variant was rejected
# 2026-06-10). The planner rule's effect should be measurable with either
# predictor; default is the cheaper + clean baseline anchor.
predictor_variant: default

report_formats:
  - json
  - markdown
